spec:
  name: php85-nginx-mysql
  region: sgp
  services:
    - name: web
      git:
        repo_clone_url: https://github.com/iamtanchan/php85-nginx-mysql.git
        branch: main
      dockerfile_path: Dockerfile
      http_port: 80
      envs:
        - key: DB_HOST
          scope: RUN_TIME
          value: your-managed-mysql-host
        - key: DB_PORT
          scope: RUN_TIME
          value: "25060"
        - key: DB_DATABASE
          scope: RUN_TIME
          value: your-database-name
        - key: DB_USERNAME
          scope: RUN_TIME
          value: your-database-user
        - key: DB_PASSWORD
          scope: RUN_TIME
          type: SECRET
          value: your-database-password
        - key: DB_SSL_MODE
          scope: RUN_TIME
          value: REQUIRED
        - key: DB_SSL_CA_PEM
          scope: RUN_TIME
          type: SECRET
          value: PASTE_CA_CERT_PEM_HERE
