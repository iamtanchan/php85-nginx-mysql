services:
  web:
    build:
      context: .
      dockerfile: docker-config/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    expose:
      - "9000"
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: docker-config/nginx/Dockerfile
    restart: unless-stopped
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - web

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2.3
    profiles:
      - dev
    restart: unless-stopped
    environment:
      PMA_ARBITRARY: 1
      PMA_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PHPMYADMIN_PORT:-8081}:80"

volumes:
  mysql-data:
